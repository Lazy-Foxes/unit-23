          #supply
          Quartermaster: [ 1, 1 ]
          SalvageSpecialist: [ 3, 3 ]
          CargoTechnician: [ 4, 8 ]
          #civilian
          Passenger: [ -1, -1 ]
          Clown: [ 1, 1 ]
          Mime: [ 1, 1 ]
          Musician: [ 1, 1 ]
          Boxer: [ 2, 2 ]
          #silicon
          # StationAi: [ 1, 1 ] no AI on map
          Borg: [ 3, 2 ]
