          !type:NanotrasenNameGenerator
          prefixCreator: 'TG'
      - type: StationEmergencyShuttle
        emergencyShuttlePath: /Maps/Shuttles/emergency_omega.yml
      - type: StationJobs
        overflowJobs:
        - Passenger
        availableJobs:
          #service
          Captain: [ 1, 1 ]
          HeadOfPersonnel: [ 1, 1 ]
          Bartender: [ 2, 2 ]
          Botanist: [ 2, 2 ]
          Chef: [ 2, 2 ]
          Janitor: [ 3, 5 ]
          Chaplain: [ 2, 2 ]
          Librarian: [ 1, 1 ]
          Reporter: [ 2, 2 ]
          ServiceWorker: [ 4, 4 ]
          #engineering
          ChiefEngineer: [ 1, 1 ]
          AtmosphericTechnician: [ 2, 2 ]
          StationEngineer: [ 6, 6 ]
          TechnicalAssistant: [ 4, 5 ]
          #medical
          ChiefMedicalOfficer: [ 1, 1 ]
          Chemist: [ 3, 3 ]
          MedicalDoctor: [ 4, 4 ]
          Paramedic: [ 2, 2 ]
          MedicalIntern: [ 3, 5 ]
          Psychologist: [ 1, 1 ]
          #science
          ResearchDirector: [ 1, 1 ]
          Scientist: [ 4, 4 ]
          ResearchAssistant: [ 3, 5 ]
          #security
          HeadOfSecurity: [ 1, 1 ]
          Warden: [ 1, 1 ]
          SecurityOfficer: [ 12, 12 ]
          Detective: [ 1, 1 ]
          SecurityCadet: [ 6, 6 ]
          Lawyer: [ 2, 2 ]
