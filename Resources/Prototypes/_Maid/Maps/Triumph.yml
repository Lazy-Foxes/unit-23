- type: gameMap
  id: TriumphMaid
  mapName: 'Triumph Station'
  mapPath: /Maps/_Maid/TriumphMaid.yml
  minPlayers: 20
  stations:
    TriumphMaidStation:
      stationProto: StandardNanotrasenStation
      components:
      - type: StationNameSetup
        mapNameTemplate: '{0} Triumph Station {1}'
